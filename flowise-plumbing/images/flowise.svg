<svg width="900" height="1100" viewBox="0 0 900 1100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowise Plumbing — copper pipework with flowing water">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1B26"/>
      <stop offset="0.55" stop-color="#10303A"/>
      <stop offset="1" stop-color="#0B2E38"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E0915A"/>
      <stop offset="0.45" stop-color="#C0703C"/>
      <stop offset="1" stop-color="#8A4B25"/>
    </linearGradient>
    <linearGradient id="copperV" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F0AD78"/>
      <stop offset="0.5" stop-color="#C0703C"/>
      <stop offset="1" stop-color="#7C4321"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#5FE3CE"/>
      <stop offset="1" stop-color="#1EA896"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#1EA896" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1EA896" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="900" height="1100" rx="0" fill="url(#bg)"/>
  <circle cx="640" cy="300" r="320" fill="url(#glow)"/>
  <circle cx="240" cy="860" r="280" fill="url(#glow)" opacity="0.7"/>

  <!-- subtle grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.05">
    <path d="M0 180 H900 M0 380 H900 M0 580 H900 M0 780 H900 M0 980 H900"/>
    <path d="M150 0 V1100 M350 0 V1100 M550 0 V1100 M750 0 V1100"/>
  </g>

  <!-- flowing water stream behind pipes -->
  <path d="M120 60 C 320 240, 80 420, 300 560 S 720 720, 540 980 C 480 1060, 620 1090, 760 1040"
        stroke="url(#water)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.45" filter="url(#soft)"/>

  <!-- ===== Main copper pipe run ===== -->
  <g stroke-linecap="round">
    <!-- vertical riser -->
    <rect x="404" y="150" width="92" height="520" rx="14" fill="url(#copper)"/>
    <rect x="404" y="150" width="30" height="520" rx="14" fill="#F4B782" opacity="0.55"/>
    <!-- couplings -->
    <rect x="392" y="300" width="116" height="34" rx="8" fill="url(#copperV)"/>
    <rect x="392" y="520" width="116" height="34" rx="8" fill="url(#copperV)"/>

    <!-- elbow joint to the right -->
    <path d="M450 640 q 0 110 110 110 l 150 0" stroke="url(#copper)" stroke-width="92" fill="none"/>
    <path d="M450 640 q 0 110 110 110 l 150 0" stroke="#F4B782" stroke-opacity="0.5" stroke-width="26" fill="none"/>
    <!-- outlet flange -->
    <rect x="690" y="700" width="40" height="100" rx="10" fill="url(#copperV)"/>
    <circle cx="710" cy="750" r="34" fill="#7C4321"/>
    <circle cx="710" cy="750" r="20" fill="#0E1B26"/>

    <!-- valve wheel on the riser -->
    <line x1="450" y1="410" x2="450" y2="350" stroke="url(#copperV)" stroke-width="20"/>
    <circle cx="450" cy="330" r="58" fill="none" stroke="url(#copper)" stroke-width="16"/>
    <g stroke="url(#copper)" stroke-width="14">
      <line x1="450" y1="278" x2="450" y2="382"/>
      <line x1="398" y1="330" x2="502" y2="330"/>
      <line x1="413" y1="293" x2="487" y2="367"/>
      <line x1="487" y1="293" x2="413" y2="367"/>
    </g>
    <circle cx="450" cy="330" r="14" fill="#7C4321"/>
  </g>

  <!-- water jet from outlet -->
  <path d="M736 752 C 800 760, 820 820, 770 900 C 740 950, 800 980, 860 950"
        stroke="url(#water)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- droplets -->
  <g fill="url(#water)">
    <path d="M250 720 c 22 26 22 44 0 60 c -22 -16 -22 -34 0 -60Z"/>
    <path d="M300 800 c 16 19 16 32 0 44 c -16 -12 -16 -25 0 -44Z" opacity="0.8"/>
    <path d="M620 540 c 18 22 18 36 0 50 c -18 -14 -18 -28 0 -50Z" opacity="0.7"/>
    <path d="M210 420 c 14 17 14 28 0 39 c -14 -11 -14 -22 0 -39Z" opacity="0.6"/>
  </g>

  <!-- monogram badge -->
  <g>
    <circle cx="190" cy="200" r="70" fill="#F4EFE6"/>
    <text x="190" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="86" font-style="italic" fill="#0E1B26">F</text>
  </g>
</svg>
